<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>砚溪大写 · 小写金额转财务大写</title>
<style>
  :root{
    --paper:#f1e7d0;
    --paper-card:#fbf5e4;
    --ink:#332f28;
    --ink-soft:#7a6f5c;
    --seal:#b23a2e;
    --seal-deep:#8f2c22;
    --line:#c9b486;
    --line-soft:#e6d9bb;
    --gold:#b8893b;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ height:100%; }
  body{
    font-family:"Kaiti SC","STKaiti","KaiTi","楷体","Songti SC","SimSun","宋体",serif;
    color:var(--ink);
    background:
      radial-gradient(circle at 20% 14%, rgba(255,255,255,.5), transparent 42%),
      radial-gradient(circle at 80% 86%, rgba(184,137,59,.16), transparent 52%),
      var(--paper);
    background-attachment:fixed;
    min-height:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:28px 14px;
  }
  
  .card{
    position:relative; overflow:hidden;
    width:100%; max-width:480px;
    background:rgba(251,245,228,.88);
    -webkit-backdrop-filter:blur(12px) saturate(1.1);
    backdrop-filter:blur(12px) saturate(1.1);
    border:1px solid var(--line);
    border-radius:6px;
    padding:30px 28px 22px;
    box-shadow:0 14px 38px rgba(90,70,40,.20), inset 0 0 0 5px rgba(255,255,255,.4);
  }
  .card::after{
    content:""; position:absolute; inset:10px;
    border:1px solid var(--line-soft); border-radius:3px; pointer-events:none;
  }
  .inner{ position:relative; z-index:1; }
  /* 头部 */
  .head{ display:flex; align-items:center; gap:14px; }
  .seal{
    flex:0 0 auto; width:50px; height:50px;
    background:linear-gradient(160deg,var(--seal),var(--seal-deep));
    color:var(--paper-card); border-radius:5px;
    display:flex; align-items:center; justify-content:center;
    font-size:30px; font-weight:700;
    box-shadow:0 2px 0 rgba(120,40,30,.5), inset 0 0 0 1px rgba(255,255,255,.25);
    transform:rotate(-3deg);
  }
  .title{ font-size:25px; letter-spacing:5px; font-weight:700; }
  .subtitle{ font-size:12.5px; color:var(--ink-soft); letter-spacing:2px; margin-top:3px; }
  .divider{
    display:flex; align-items:center; gap:10px; margin:16px 0 4px;
    color:var(--line); font-size:11px; letter-spacing:3px;
  }
  .divider::before,.divider::after{ content:""; height:1px; flex:1; background:linear-gradient(90deg,transparent,var(--line),transparent); }
  .divider .dot{ color:var(--seal); transform:scale(1.1); }

  .field{ margin-top:18px; }
  label{ display:block; font-size:14px; color:var(--ink-soft); letter-spacing:2px; margin-bottom:8px; }
  .input-row{ display:flex; align-items:baseline; gap:8px; border-bottom:1.5px solid var(--line); padding-bottom:6px; }
  .rmb{ font-size:22px; color:var(--seal); }
  #amount{
    flex:1; border:none; outline:none; background:transparent;
    font-family:inherit; font-size:24px; color:var(--ink); letter-spacing:1px;
  }
  #amount::placeholder{ color:#bcae90; font-size:17px; letter-spacing:1px; }

  .result-box{ margin-top:20px; min-height:60px; }
  .result-label{ font-size:13px; color:var(--ink-soft); letter-spacing:2px; margin-bottom:6px; }
  .result{
    font-size:25px; line-height:1.55; letter-spacing:2px; color:var(--ink);
    word-break:break-all; min-height:38px;
  }
  .result.empty{ color:#c3b595; font-size:18px; letter-spacing:1px; }
  .copy-btn{
    margin-top:14px; display:inline-flex; align-items:center; gap:6px;
    font-family:inherit; font-size:14px; letter-spacing:2px;
    color:var(--seal); background:transparent;
    border:1px solid var(--seal); border-radius:4px;
    padding:7px 18px; cursor:pointer; transition:.18s;
  }
  .copy-btn:hover{ background:var(--seal); color:var(--paper-card); }
  .copy-btn:active{ transform:translateY(1px); }
  .copy-btn.done{ background:var(--seal); color:var(--paper-card); }
  .err{ color:var(--seal); font-size:13px; letter-spacing:1px; margin-top:10px; min-height:18px; }

  /* 复制格式切换 */
  .fmt{ margin-top:20px; }
  .fmt-title{ font-size:13px; color:var(--ink-soft); letter-spacing:2px; margin-bottom:8px; }
  .seg{ display:flex; gap:8px; flex-wrap:wrap; }
  .seg label{
    flex:1; min-width:84px; text-align:center; cursor:pointer;
    font-size:13.5px; letter-spacing:1px; color:var(--ink-soft);
    border:1px solid var(--line); border-radius:4px; padding:8px 4px;
    background:rgba(255,255,255,.35); transition:.16s; margin:0;
  }
  .seg label.active{
    color:var(--paper-card); background:var(--seal); border-color:var(--seal);
    box-shadow:0 2px 0 rgba(120,40,30,.4);
  }
  .seg input{ display:none; }

  /* 历史记录 */
  .history{ margin-top:20px; display:none; }
  .history.show{ display:block; }
  .hist-title{ font-size:13px; color:var(--ink-soft); letter-spacing:2px; margin-bottom:8px; }
  .hist-list{ display:flex; flex-direction:column; gap:6px; }
  .hist-item{
    display:flex; align-items:baseline; gap:8px; cursor:pointer;
    border:1px dashed var(--line-soft); border-radius:4px; padding:7px 10px;
    background:rgba(255,255,255,.3); transition:.15s;
  }
  .hist-item:hover{ border-color:var(--seal); background:rgba(178,58,46,.06); }
  .hist-raw{ font-size:13px; color:var(--ink-soft); min-width:64px; }
  .hist-arrow{ color:var(--line); font-size:12px; }
  .hist-text{ font-size:15px; color:var(--ink); letter-spacing:1px; word-break:break-all; flex:1; }
  .hist-hint{ font-size:11px; color:#b3a589; white-space:nowrap; }

  /* 页脚品牌 + 小红书 */
  .foot{ position:relative; z-index:1; margin-top:24px; padding-top:14px;
    border-top:1px solid var(--line-soft); text-align:center; }
  .brand{ font-size:13px; letter-spacing:3px; color:var(--gold); }
  .contact{ margin-top:7px; font-size:12.5px; color:var(--ink-soft); letter-spacing:1px; }
  .contact b{ color:var(--seal); font-weight:700; cursor:pointer; }
  .contact b:hover{ text-decoration:underline; }

  .bg-photo{
    position:fixed; inset:0; z-index:-2;
    background-size:cover; background-position:center 28%;
    filter:blur(4px) brightness(1.05) saturate(1.05);
    transform:scale(1.05);
  }
  .bg-vignette{
    position:fixed; inset:0; z-index:-1; pointer-events:none;
    background:radial-gradient(ellipse at 50% 45%, transparent 30%, rgba(50,35,22,.45) 100%);
  }

</style>
</head>

<script>
  const D = ['零','壹','贰','叁','肆','伍','陆','柒','捌','玖'];
  const U = ['','拾','佰','仟'];
  const G = ['','万','亿','兆','京','垓','秭','穰'];

  function stringAdd1(s){
    const arr = s.split('');
    let carry = 1;
    for(let i = arr.length - 1; i >= 0 && carry; i--){
      const v = (+arr[i]) + carry;
      if(v >= 10){ arr[i] = '0'; carry = 1; }
      else { arr[i] = String(v); carry = 0; }
    }
    if(carry) arr.unshift('1');
    return arr.join('');
  }

  function intToCapital(intStr){
    intStr = intStr.replace(/^0+/, '');
    if(intStr === '') return '零';
    const groups = [];
    let s = intStr;
    while(s.length){
      groups.unshift(s.slice(-4));
      s = s.slice(0, -4);
    }
    const n = groups.length;
    let res = '';
    let zeroPending = false;
    for(let g = 0; g < n; g++){
      const group = groups[g];
      const groupUnit = G[n - 1 - g];
      let groupRes = '';
      let groupZeroPending = false;
      let groupAny = false;
      for(let k = 0; k < group.length; k++){
        const d = +group[k];
        const pos = group.length - 1 - k;
        if(d === 0){
          groupZeroPending = true;
        } else {
          if(groupZeroPending){ groupRes += '零'; groupZeroPending = false; }
          groupRes += D[d] + U[pos];
          groupAny = true;
        }
      }
      if(groupAny){
        if(zeroPending && res !== '' && groupRes[0] === '零'){
          groupRes = groupRes.slice(1);
        }
        if(zeroPending && res !== '') res += '零';
        res += groupRes + groupUnit;
        zeroPending = false;
      } else {
        if(res !== '') zeroPending = true;
      }
    }
    return res || '零';
  }

  function roundDecimal(intPart, decPart){
    if(decPart.length === 0) return { intPart, jiao:0, fen:0 };
    if(decPart.length === 1) return { intPart, jiao:+decPart[0], fen:0 };
    if(decPart.length === 2) return { intPart, jiao:+decPart[0], fen:+decPart[1] };
    let val = +decPart.slice(0,2);
    if(+decPart[2] >= 5) val += 1;
    if(val >= 100){ val -= 100; intPart = stringAdd1(intPart); }
    return { intPart, jiao:Math.floor(val/10), fen:val % 10 };
  }

  function decimalPart(intPart, jiao, fen){
    const hasInt = intPart !== '0' && intPart !== '';
    let res = '';
    if(hasInt) res += intToCapital(intPart) + '元';
    if(jiao === 0 && fen === 0){
      return hasInt ? res + '整' : '零元整';
    }
    if(jiao > 0){
      res += D[jiao] + '角';
    } else if(hasInt){
      res += '零';
    }
    if(fen > 0){
      res += D[fen] + '分';
    }
    return res;
  }

  function parseInput(raw){
    let s = raw.replace(/[,，\s]/g, '');
    if(s === '') return null;
    let neg = false;
    if(s[0] === '-'){ neg = true; s = s.slice(1); }
    if(!/^\d*\.?\d*$/.test(s) || s === '.' ) return { error:true };
    if(s.startsWith('.')) s = '0' + s;
    if(s.endsWith('.')) s = s.slice(0, -1);
    let parts = s.split('.');
    let intPart = parts[0] === '' ? '0' : parts[0];
    let decPart = parts[1] || '';
    if(intPart.replace(/^0+/,'') === '') intPart = '0';
    if(intPart.length > 20) return { error:true, msg:'数字过长，仅支持到京（16位）以内' };
    const r = roundDecimal(intPart, decPart);
    return { neg, intPart:r.intPart, jiao:r.jiao, fen:r.fen };
  }

  // 核心转换：返回纯大写
  function convertCore(raw){
    const p = parseInput(raw);
    if(p === null) return { text:'', empty:true };
    if(p.error) return { error:p.msg || '请输入有效的数字' };
    let result = decimalPart(p.intPart, p.jiao, p.fen);
    const allZero = (p.intPart === '0' || p.intPart === '') && p.jiao === 0 && p.fen === 0;
    if(p.neg && !allZero) result = '负' + result;
    return { text:result };
  }

  // 按所选格式拼装展示/复制文本
  function formatText(raw, coreText, fmt){
    if(fmt === 'B') return '人民币' + coreText;
    if(fmt === 'C') return raw + ' → ' + coreText;
    return coreText; // A
  }

  // ===== UI =====
  const input = document.getElementById('amount');
  const resultEl = document.getElementById('result');
  const errEl = document.getElementById('err');
  const copyBtn = document.getElementById('copy');
  const seg = document.getElementById('seg');
  const historyBox = document.getElementById('history');
  const histList = document.getElementById('histList');

  let curFmt = 'A';

  // 历史记录（localStorage 持久化）
  const HKEY = 'yanxi_history_v2';
  function loadHistory(){
    try{ return JSON.parse(localStorage.getItem(HKEY)) || []; }catch(e){ return []; }
  }
  function saveHistory(list){
    try{ localStorage.setItem(HKEY, JSON.stringify(list)); }catch(e){}
  }
  let history = loadHistory();

  function renderHistory(){
    if(history.length === 0){ historyBox.classList.remove('show'); return; }
    historyBox.classList.add('show');
    histList.innerHTML = '';
    history.forEach(item => {
      const row = document.createElement('div');
      row.className = 'hist-item';
      row.innerHTML = `<span class="hist-raw">${escapeHtml(item.raw)}</span>`+
                      `<span class="hist-arrow">→</span>`+
                      `<span class="hist-text">${escapeHtml(item.text)}</span>`+
                      `<span class="hist-hint">复制</span>`;
      row.addEventListener('click', () => copyText(item.text, row));
      histList.appendChild(row);
    });
  }
  function pushHistory(raw, text){
    history = history.filter(h => !(h.raw === raw && h.text === text));
    history.unshift({ raw, text });
    if(history.length > 6) history = history.slice(0, 6);
    saveHistory(history);
    renderHistory();
  }
  function escapeHtml(s){
    return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  // 复制通用
  function copyText(text, el){
    const done = () => {
      if(el && el.classList.contains('copy-btn')){
        el.textContent = '已复制 ✓'; el.classList.add('done');
        setTimeout(() => { el.textContent = '复制结果'; el.classList.remove('done'); }, 1500);
      }
    };
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(text).then(done).catch(() => fallbackCopy(text, done));
    } else { fallbackCopy(text, done); }
  }
  function fallbackCopy(text, done){
    const ta = document.createElement('textarea');
    ta.value = text; ta.style.position='fixed'; ta.style.opacity='0';
    document.body.appendChild(ta); ta.select();
    try{ document.execCommand('copy'); }catch(e){}
    document.body.removeChild(ta); done();
  }

  function render(){
    const raw = input.value.trim();
    errEl.textContent = '';
    if(raw === ''){
      resultEl.textContent = '输入数字，自动转换…';
      resultEl.classList.add('empty');
      copyBtn.style.display = 'none';
      return;
    }
    const out = convertCore(raw);
    if(out.error){
      errEl.textContent = '✕ ' + out.error;
      resultEl.textContent = '—';
      resultEl.classList.add('empty');
      copyBtn.style.display = 'none';
      return;
    }
    const display = formatText(raw, out.text, curFmt);
    resultEl.textContent = display;
    resultEl.classList.remove('empty');
    copyBtn.style.display = 'inline-flex';
    copyBtn.classList.remove('done');
    copyBtn.textContent = '复制结果';
    pushHistory(raw, display);
  }

  input.addEventListener('input', render);

  // 格式切换
  seg.querySelectorAll('label').forEach(lab => {
    lab.addEventListener('click', () => {
      seg.querySelectorAll('label').forEach(l => l.classList.remove('active'));
      lab.classList.add('active');
      curFmt = lab.dataset.fmt;
      render();
    });
  });

  copyBtn.addEventListener('click', () => copyText(resultEl.textContent, copyBtn));

  // 小红书号点击复制
  document.getElementById('xhs').addEventListener('click', function(){
    copyText(this.textContent, null);
    const old = this.textContent;
    this.textContent = '已复制 ✓';
    setTimeout(() => { this.textContent = old; }, 1500);
  });

  renderHistory();
  render();
</script>
</body>
</html>
